<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="calculator">
      <h1>Welcome to our Calculator</h1>

      <div>
        <input type="text" placeholder="0" readonly class="display" />
      </div>

      <div class="buttons">
        <button class="btn-clear">AC</button>
        <button class="btn-del">DEL</button>
        <button class="btn-operator">%</button>
        <button class="btn-operator">/</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="btn-operator">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="btn-operator">-</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="btn-operator">+</button>

        <button>00</button>
        <button>0</button>
        <button>.</button>
        <button class="btn-equal">=</button>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
